# Neo4j 5 memory config — tuned for 4GB host with GPU workloads running alongside
# These values leave ~3GB for OS + Ollama + Whisper + other services.

server.memory.heap.initial_size=256m
server.memory.heap.max_size=512m
server.memory.pagecache.size=256m

# Allow unauthenticated local connections from within Docker network
# (Auth is still enforced via NEO4J_AUTH env var — this just relaxes procedure allowlist)
dbms.security.procedures.unrestricted=apoc.*
dbms.security.procedures.allowlist=apoc.*
